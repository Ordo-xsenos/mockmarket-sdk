name: CI & Publish

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check src/

      - name: mypy
        run: uv run mypy src/

  publish:
    name: Build and publish package
    if: startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
